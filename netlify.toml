[build]
  # Comando de build para Next.js con legacy-peer-deps
  command = "npm run build"
  
  # Directorio a publicar
  publish = ".next"

[build.environment]
  # Versión de Node.js (Next.js requiere >= 20.9.0)
  NODE_VERSION = "20"
  
  # Desactivar Turbopack en Netlify para evitar problemas con lightningcss
  NEXT_TURBOPACK = "false"

# Configuración para Next.js
[[plugins]]
  package = "@netlify/plugin-nextjs"
