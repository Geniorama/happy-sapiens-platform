[build]
  # Comando de build
  command = "npm run build"
  
  # Directorio a publicar
  publish = ".next"

[build.environment]
  # Usar npm con legacy peer deps
  NPM_FLAGS = "--legacy-peer-deps"
  
  # Versión de Node.js (Next.js requiere >= 20.9.0)
  NODE_VERSION = "20"

# Configuración para Next.js
[[plugins]]
  package = "@netlify/plugin-nextjs"
